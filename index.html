<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Papa Jones CRM | بوابة التوظيف</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="https://i.ibb.co/WpNkqzdP/1434e407-9758-4698-bfad-fb211e625fc1-removebg-preview.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0c10 0%, #0f172a 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    /* شاشة التحميل */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0c10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    .loading-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #d4a843, #f0c060);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      animation: pulse 1.5s infinite;
    }
    
    .loading-logo img {
      width: 55px;
      height: 55px;
      object-fit: contain;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 168, 67, 0.2);
      border-top-color: #d4a843;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    
    .loading-text {
      color: #9aa3b5;
      font-size: 14px;
      letter-spacing: 1px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    
    /* iframe */
    .app-iframe {
      width: 100%;
      height: 100vh;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    .app-iframe.loaded {
      opacity: 1;
    }
    
    /* رسالة خطأ */
    .error-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e2330;
      border: 1px solid #e05555;
      border-radius: 16px;
      padding: 32px 48px;
      text-align: center;
      z-index: 10000;
      max-width: 90vw;
    }
    
    .error-message h3 {
      color: #e05555;
      margin-bottom: 12px;
      font-size: 20px;
    }
    
    .error-message p {
      color: #9aa3b5;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .error-message button {
      background: linear-gradient(135deg, #d4a843, #f0c060);
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      color: #0a0c10;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    
    .error-message button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(212, 168, 67, 0.3);
    }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">
      <img src="https://i.ibb.co/WpNkqzdP/1434e407-9758-4698-bfad-fb211e625fc1-removebg-preview.png" alt="Papa Jones">
    </div>
    <div class="loading-spinner"></div>
    <div class="loading-text">جاري تحميل النظام...</div>
  </div>

  <!-- iframe لتشغيل تطبيق GAS -->
  <iframe class="app-iframe" id="appFrame" src="about:blank"></iframe>

  <script>
    (function() {
      // ============================================================
      // عنوان تطبيق Google Apps Script (GAS)
      // ⚠️ استخدم الرابط الذي يظهر عند نشر التطبيق كتطبيق ويب
      // ============================================================
      const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxOEgpmFrkSXDS9RiSXXO9q8sDaflTGOd4bYZFmFquvTPZGhUfM8mFHWAuigBktSbawNg/exec';
      
      // إعدادات إعادة المحاولة
      const MAX_RETRIES = 3;
      const RETRY_DELAY = 2000;
      
      let retryCount = 0;
      const loadingScreen = document.getElementById('loadingScreen');
      const appFrame = document.getElementById('appFrame');
      
      // دالة إخفاء شاشة التحميل
      function hideLoading() {
        if (loadingScreen) {
          loadingScreen.style.opacity = '0';
          setTimeout(() => {
            loadingScreen.style.display = 'none';
          }, 500);
        }
      }
      
      // دالة عرض خطأ
      function showError(message, canRetry = true) {
        if (loadingScreen) {
          const errorDiv = document.createElement('div');
          errorDiv.className = 'error-message';
          errorDiv.innerHTML = `
            <h3>⚠️ خطأ في الاتصال</h3>
            <p>${message}</p>
            ${canRetry ? '<button onclick="location.reload()">🔄 إعادة المحاولة</button>' : '<button onclick="window.location.href=\'https://github.com\'">🏠 العودة للرئيسية</button>'}
          `;
          loadingScreen.innerHTML = '';
          loadingScreen.style.justifyContent = 'center';
          loadingScreen.appendChild(errorDiv);
        }
      }
      
      // دالة التحقق من صحة الرابط
      function isValidGASUrl(url) {
        try {
          const urlObj = new URL(url);
          return urlObj.hostname === 'script.google.com' && 
                 urlObj.pathname.includes('/macros/s/') &&
                 urlObj.pathname.includes('/exec');
        } catch(e) {
          return false;
        }
      }
      
      // دالة تحميل التطبيق مع إعادة المحاولة
      function loadAppWithRetry() {
        // التحقق من صحة الرابط
        if (!isValidGASUrl(GAS_WEB_APP_URL)) {
          console.error('رابط GAS غير صالح:', GAS_WEB_APP_URL);
          showError('تكوين الرابط غير صحيح. يرجى التحقق من عنوان التطبيق.', false);
          return;
        }
        
        console.log('جاري تحميل التطبيق من:', GAS_WEB_APP_URL);
        
        // تعيين iframe لتحميل التطبيق
        appFrame.src = GAS_WEB_APP_URL;
        
        // مؤقت للتحقق من التحميل
        let loadTimeout;
        
        // عند نجاح تحميل iframe
        appFrame.onload = function() {
          clearTimeout(loadTimeout);
          console.log('تم تحميل التطبيق بنجاح');
          appFrame.classList.add('loaded');
          hideLoading();
        };
        
        // عند خطأ في تحميل iframe
        appFrame.onerror = function() {
          clearTimeout(loadTimeout);
          console.error('فشل تحميل التطبيق، المحاولة:', retryCount + 1);
          
          if (retryCount < MAX_RETRIES - 1) {
            retryCount++;
            if (loadingScreen) {
              loadingScreen.querySelector('.loading-text').innerHTML = 
                `جاري إعادة المحاولة (${retryCount + 1}/${MAX_RETRIES})...`;
            }
            setTimeout(loadAppWithRetry, RETRY_DELAY);
          } else {
            showError('تعذر الاتصال بخادم التطبيق. يرجى التحقق من اتصال الإنترنت أو المحاولة لاحقاً.', true);
          }
        };
        
        // مهلة زمنية للتحميل (10 ثوانٍ)
        loadTimeout = setTimeout(() => {
          console.warn('انتهت مهلة تحميل التطبيق');
          if (retryCount < MAX_RETRIES - 1) {
            retryCount++;
            if (loadingScreen) {
              loadingScreen.querySelector('.loading-text').innerHTML = 
                `انتهت المهلة، إعادة المحاولة (${retryCount + 1}/${MAX_RETRIES})...`;
            }
            appFrame.src = 'about:blank';
            setTimeout(loadAppWithRetry, RETRY_DELAY);
          } else {
            appFrame.onerror();
          }
        }, 10000);
      }
      
      // بدء تحميل التطبيق
      loadAppWithRetry();
      
      // إضافة مستمع لأحداث الاتصال بالشبكة
      window.addEventListener('online', function() {
        console.log('الاتصال بالإنترنت تم استعادته');
        if (loadingScreen && loadingScreen.style.display !== 'none') {
          retryCount = 0;
          loadAppWithRetry();
        }
      });
      
      window.addEventListener('offline', function() {
        console.log('فقد الاتصال بالإنترنت');
        if (loadingScreen && loadingScreen.style.display !== 'none') {
          loadingScreen.querySelector('.loading-text').innerHTML = '⚠️ لا يوجد اتصال بالإنترنت...';
        }
      });
      
      // منع بعض سلوكيات iframe التي قد تسبب مشاكل
      appFrame.setAttribute('allow', 'same-origin');
      appFrame.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-same-origin allow-modals');
      
      // تصحيح مشكلة التوجيه في iframe
      window.addEventListener('message', function(event) {
        // السماح برسائل من نفس المصدر
        if (event.origin === new URL(GAS_WEB_APP_URL).origin) {
          console.log('رسالة مستلمة من التطبيق:', event.data);
        }
      });
    })();
  </script>
  
  <!-- دعم أحجام الشاشات المختلفة -->
  <style>
    @media (max-width: 768px) {
      .loading-logo {
        width: 60px;
        height: 60px;
        border-radius: 18px;
      }
      .loading-logo img {
        width: 40px;
        height: 40px;
      }
      .loading-spinner {
        width: 30px;
        height: 30px;
      }
      .loading-text {
        font-size: 12px;
      }
      .error-message {
        padding: 20px 32px;
      }
      .error-message h3 {
        font-size: 18px;
      }
    }
  </style>
</body>
</html>
